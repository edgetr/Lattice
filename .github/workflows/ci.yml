name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run core tests
        run: ./script/build_and_run.sh --test

      - name: Verify development app bundle
        run: ./script/build_and_run.sh --verify
