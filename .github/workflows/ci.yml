name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Full `swift test` currently crashes the Xcode 26 testing helper (signal 13) on
      # this runner. Use the deterministic LatticeCore verifier that ships with the repo
      # and already covers the policy/safety contracts that matter for merge gates.
      - name: Run core verification
        env:
          LATTICE_TEST_MODE: fallback
        run: ./script/build_and_run.sh --test

      - name: Verify development app bundle
        run: ./script/build_and_run.sh --verify
